name: Daily ArXiv Papers Update

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scraper (with retry)
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "=== Scraper attempt $attempt/3 ==="
            python scrape_arxiv.py
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "Scraper succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((300 * attempt))
              echo "Attempt $attempt failed (exit $status). Sleeping ${sleep_seconds}s before retry..."
              sleep "$sleep_seconds"
            fi
          done
          echo "All scraper attempts failed."
          exit 1

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update papers - $(date +'%Y-%m-%d')"
          git push
